name: Build AeroQuant APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create AeroQuant Project Files
        run: |
          mkdir -p app/src/main/java/com/aeroquant/turbo
          mkdir -p app/src/main/res/layout
          
          # 1. إعداد ملفات الإعدادات
          echo "rootProject.name = 'AeroQuant'" > settings.gradle
          echo "include ':app'" >> settings.gradle

          # 2. ملف بناء المشروع الرئيسي
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 3. ملف بناء التطبيق (App)
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.aeroquant.turbo'
              compileSdk 34
              defaultConfig {
                  applicationId "com.aeroquant.turbo"
                  minSdk 28
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

          # 4. ملف المانيفست (الجزء اللي كان ناقص)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="AeroQuant">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 5. كود الجافا/كوتلن
          cat <<EOF > app/src/main/java/com/aeroquant/turbo/MainActivity.kt
          package com.aeroquant.turbo
          import android.app.Activity
          import android.os.Bundle
          class MainActivity : Activity() {
              override fun onCreate(s: Bundle?) { super.onCreate(s) }
          }
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK with Gradle
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AeroQuant-Final
          path: app/build/outputs/apk/debug/app-debug.apk
