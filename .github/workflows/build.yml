name: AeroQuant Zenith Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Environment
        uses: actions/checkout@v4

      - name: Initialize Android Core
        run: |
          mkdir -p app/src/main/java/com/aeroquant/turbo
          
          # 1. ملف الخصائص الإجباري (يمنع أي كراش في السيرفر)
          cat << 'EOF' > gradle.properties
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          EOF

          # 2. إعدادات المشروع (مكتوبة بـ Kotlin DSL للصرامة)
          cat << 'EOF' > settings.gradle.kts
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "AeroQuant"
          include(":app")
          EOF

          # 3. محرك البناء الرئيسي
          cat << 'EOF' > build.gradle.kts
          plugins {
              id("com.android.application") version "8.1.0" apply false
              id("org.jetbrains.kotlin.android") version "1.8.20" apply false
          }
          EOF

          # 4. محرك التطبيق وصلاحيات Shizuku
          cat << 'EOF' > app/build.gradle.kts
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          android {
              namespace = "com.aeroquant.turbo"
              compileSdk = 34
              defaultConfig {
                  applicationId = "com.aeroquant.turbo"
                  minSdk = 28
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0-ZENITH"
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation("dev.rikka.shizuku:api:13.1.0")
              implementation("dev.rikka.shizuku:provider:13.1.0")
          }
          EOF

          # 5. تصريح العبور العميل (Manifest)
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="moe.shizuku.manager.permission.API_V23" />
              <application android:label="AeroQuant" android:theme="@android:style/Theme.NoDisplay">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 6. الكود المصدري الخارق (تفعيل سرعة البرق)
          cat << 'EOF' > app/src/main/java/com/aeroquant/turbo/MainActivity.kt
          package com.aeroquant.turbo
          import android.app.Activity
          import android.os.Bundle
          import android.widget.Toast
          import rikka.shizuku.Shizuku

          class MainActivity : Activity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  try {
                      if (Shizuku.checkSelfPermission() == android.content.pm.PackageManager.PERMISSION_GRANTED) {
                          // إطلاق أوامر تدمير البطء في الجوال
                          Shizuku.newProcess(arrayOf("sh", "-c", "settings put global window_animation_scale 0.2 && settings put global transition_animation_scale 0.2 && settings put global animator_duration_scale 0.2"), null, null).waitFor()
                          Toast.makeText(this, "🚀 AEROQUANT MAX POWER: ACTIVE!", Toast.LENGTH_LONG).show()
                      } else {
                          Shizuku.requestPermission(0)
                          Toast.makeText(this, "Please grant Shizuku permission.", Toast.LENGTH_LONG).show()
                      }
                  } catch (e: Exception) {
                      Toast.makeText(this, "Engine Error. Is Shizuku running?", Toast.LENGTH_LONG).show()
                  }
                  finish() // يغلق نفسه فوراً لعدم استهلاك الرام
              }
          }
          EOF

      - name: Set up Execution Core (Java 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Gradle Build
        run: gradle :app:assembleDebug --no-daemon --info

      - name: Extract Payload (Your APK)
        uses: actions/upload-artifact@v4
        with:
          name: AeroQuant-Pro-Max-Payload
          path: app/build/outputs/apk/debug/app-debug.apk
